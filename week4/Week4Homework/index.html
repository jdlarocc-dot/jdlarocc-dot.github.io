<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Cards</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-container">
            <button>Home</button>
            <button>Shop</button>
            <button>About</button>
            <button>Contact</button>
        </div>
    </nav>

    <!-- GRID -->
    <main class="grid-container">

        <!-- CARD 1 -->
        <div class="card">
            <img src="assets/file.jpg" alt="">
            <div class="card-content">
                <h2>Sick Dinosaur</h2>
                <p>This is a sick dinosaur!</p>
            </div>
        </div>

        <!-- CARD 2 -->
        <div class="card">
            <img src="assets/warhammer-novels-d1c64c.webp" alt="">
            <div class="card-content">
                <h2>Warhammer Novels</h2>
                <p>Very good books you should check them out! Great series if your a dnd player.</p>
            </div>
        </div>

        <!-- CARD 3 -->
        <div class="card">
            <img src="assets/Fallout76-SteelDawn_Campaign_Art.jpg" alt="">
            <div class="card-content">
                <h2>Fallout 76</h2>
                <p>I literally just had this in my camera roll idk why</p>
            </div>
        </div>

        <!-- CARD 4 -->
        <div class="card">
            <img src="assets/s-l400.jpg" alt="">
            <div class="card-content">
                <h2>Supercool Warhammer Miniature</h2>
                <p>Love to paint so I thought I'd throw this guy in.</p>
            </div>
        </div>

    </main>

</body>
</html>
